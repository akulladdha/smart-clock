<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Clock</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      background: #111; color: #f0f0f0;
      display: flex; justify-content: center;
      padding: 32px 16px;
    }
    .card {
      background: #1e1e1e; border-radius: 16px;
      padding: 28px 24px; width: 100%; max-width: 360px;
    }
    h1 { font-size: 1.3rem; margin-bottom: 24px; color: #fff; }
    label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 6px; text-transform: uppercase; }
    input[type="number"] {
      width: 100%; padding: 12px 14px; background: #2a2a2a;
      border: 1px solid #333; border-radius: 10px;
      color: #f0f0f0; font-size: 1rem; outline: none;
    }
    input:focus { border-color: #4a9eff; }
    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }
    .field { margin-bottom: 20px; }
    .ringtone-group { display: flex; gap: 10px; margin-bottom: 24px; }
    .rt-btn {
      flex: 1; padding: 12px; border: 2px solid #333;
      border-radius: 10px; background: #2a2a2a;
      color: #aaa; font-size: 0.95rem; cursor: pointer;
    }
    .rt-btn.active { border-color: #4a9eff; background: #1a3a5c; color: #fff; }
    .set-btn {
      width: 100%; padding: 14px; background: #4a9eff;
      color: #fff; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    .status { margin-top: 14px; text-align: center; font-size: 0.9rem; color: #888; }
    .status.ok  { color: #4caf50; }
    .status.err { color: #f44336; }
  </style>
</head>
<body>
<div class="card">
  <h1>Smart Clock</h1>

  <!-- Sleep Debt Panel -->
  <div id="sleep-panel" style="background:#2a2a2a;border-radius:10px;padding:12px;margin-bottom:20px;">
    <div style="font-size:0.75rem;color:#888;text-transform:uppercase;margin-bottom:4px;">Sleep Debt</div>
    <div id="sleep-debt" style="font-size:1.4rem;font-weight:600;color:#4a9eff;">--</div>
    <div id="sleep-status-text" style="font-size:0.8rem;color:#888;margin-top:4px;">Loading...</div>
  </div>

  <div class="row">
    <div class="field">
      <label>Hour (0-23)</label>
      <input type="number" id="hour" min="0" max="23" placeholder="7">
    </div>
    <div class="field">
      <label>Minute (0-59)</label>
      <input type="number" id="minute" min="0" max="59" placeholder="30">
    </div>
  </div>
  <label style="margin-bottom:10px;">Ringtone</label>
  <div class="ringtone-group">
    <button class="rt-btn active" data-rt="0" onclick="selectRingtone(0)">Nokia</button>
    <button class="rt-btn"       data-rt="1" onclick="selectRingtone(1)">Beeps</button>
  </div>
  <button class="set-btn" onclick="setAlarm()">Set Alarm</button>

  <!-- Sleep Button -->
  <button class="set-btn" style="background:#534AB7;margin-top:10px;" onclick="toggleSleep()">
    Going to Sleep
  </button>

  <!-- Dismiss Button -->
  <button class="set-btn" style="background:#4caf50;margin-top:10px;" onclick="dismissAlarm()">
    Dismiss Alarm
  </button>

  <!-- Puzzle Section (hidden until alarm fires) -->
  <div id="puzzle-section" style="display:none;background:#2a2a2a;border-radius:10px;padding:16px;margin-top:16px;">
    <div style="font-size:0.8rem;color:#888;text-transform:uppercase;margin-bottom:8px;">Wake Up Puzzle</div>
    <div id="puzzle-question" style="font-size:1.8rem;font-weight:700;color:#fff;margin-bottom:12px;text-align:center;"></div>
    <input type="number" id="puzzle-input" placeholder="Your answer" style="margin-bottom:10px;">
    <button class="set-btn" onclick="submitPuzzle()">Submit</button>
    <div id="puzzle-status" style="margin-top:8px;text-align:center;color:#888;font-size:0.9rem;"></div>
  </div>

  <div class="status" id="status"></div>
</div>
<script>
  // *** CHANGE THIS TO YOUR ESP32'S IP ***
  const ESP_IP = "http://172.20.10.3";

  let selectedRingtone = 0;

  function selectRingtone(rt) {
    selectedRingtone = rt;
    document.querySelectorAll('.rt-btn').forEach(btn => {
      btn.classList.toggle('active', parseInt(btn.dataset.rt) === rt);
    });
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + (type || '');
  }

  async function setAlarm() {
    const h = parseInt(document.getElementById('hour').value);
    const m = parseInt(document.getElementById('minute').value);
    if (isNaN(h) || h < 0 || h > 23) { setStatus('Hour must be 0-23.', 'err'); return; }
    if (isNaN(m) || m < 0 || m > 59) { setStatus('Minute must be 0-59.', 'err'); return; }
    try {
      const res = await fetch(`${ESP_IP}/set?hour=${h}&minute=${m}&ringtone=${selectedRingtone}`);
      if (res.ok) setStatus('Alarm set!', 'ok');
      else        setStatus('Error ' + res.status, 'err');
    } catch (e) {
      setStatus('Could not reach ESP32. Check IP and network.', 'err');
    }
  }

  async function fetchStatus() {
    try {
      const res  = await fetch(`${ESP_IP}/status`);
      const data = await res.json();
      document.getElementById('hour').value   = data.hour;
      document.getElementById('minute').value = data.minute;
      selectRingtone(data.ringtone);
    } catch (_) {}
  }

  async function dismissAlarm() {
    try {
      const res = await fetch(`${ESP_IP}/dismiss`);
      if (res.ok) {
        setStatus('Dismissed!', 'ok');
        document.getElementById('puzzle-section').style.display = 'none';
      }
    } catch (e) { setStatus('Could not reach ESP32.', 'err'); }
  }

  async function toggleSleep() {
    try {
      await fetch(`${ESP_IP}/sleep_toggle`);
      fetchSleepStatus();
    } catch (e) { setStatus('Could not reach ESP32.', 'err'); }
  }

  async function fetchSleepStatus() {
    try {
      const res  = await fetch(`${ESP_IP}/sleep_status`);
      const data = await res.json();
      const debtEl   = document.getElementById('sleep-debt');
      const statusEl = document.getElementById('sleep-status-text');
      if (data.sleeping) {
        debtEl.textContent   = 'Sleeping...';
        debtEl.style.color   = '#7B68EE';
        statusEl.textContent = 'Press sleep button on device to wake';
      } else if (data.sleep_debt_hours > 0.5) {
        debtEl.textContent   = `+${data.sleep_debt_hours.toFixed(1)}h debt`;
        debtEl.style.color   = '#f44336';
        statusEl.textContent = `Last night: ${data.last_sleep_hours.toFixed(1)}h — target: 8h`;
      } else if (data.sleep_debt_hours < -0.5) {
        debtEl.textContent   = `${Math.abs(data.sleep_debt_hours).toFixed(1)}h surplus`;
        debtEl.style.color   = '#4caf50';
        statusEl.textContent = `Last night: ${data.last_sleep_hours.toFixed(1)}h — well rested`;
      } else {
        debtEl.textContent   = 'On track';
        debtEl.style.color   = '#4caf50';
        statusEl.textContent = `Last night: ${data.last_sleep_hours.toFixed(1)}h`;
      }
    } catch (_) {}
  }

  async function pollPuzzle() {
    try {
      const res  = await fetch(`${ESP_IP}/puzzle`);
      const data = await res.json();
      const section = document.getElementById('puzzle-section');
      if (data.active) {
        section.style.display = 'block';
        document.getElementById('puzzle-question').textContent = data.question + ' = ?';
      } else {
        section.style.display = 'none';
      }
    } catch (_) {}
  }

  async function submitPuzzle() {
    const ans = document.getElementById('puzzle-input').value;
    try {
      const res  = await fetch(`${ESP_IP}/puzzle/answer?answer=${ans}`);
      const data = await res.json();
      const statusEl = document.getElementById('puzzle-status');
      if (data.correct) {
        statusEl.textContent = 'Correct! Good morning!';
        statusEl.style.color = '#4caf50';
        document.getElementById('puzzle-section').style.display = 'none';
      } else {
        statusEl.textContent = `Wrong — try again (attempt ${data.attempts})`;
        statusEl.style.color = '#f44336';
      }
    } catch (_) {}
  }

  // Poll puzzle every 3 seconds and sleep status every 30 seconds
  setInterval(pollPuzzle, 3000);
  setInterval(fetchSleepStatus, 30000);
  window.addEventListener('load', () => { fetchStatus(); fetchSleepStatus(); });
</script>
</body>
</html>
