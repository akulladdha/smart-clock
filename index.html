<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Clock</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .card {
      background: #1e1e1e;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 360px;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 24px;
      color: #fff;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 12px 14px;
      background: #2a2a2a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #4a9eff; }

    .row {
      display: flex;
      gap: 12px;
    }

    .row .field { flex: 1; }

    .field { margin-bottom: 20px; }

    .ringtone-group {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .rt-btn {
      flex: 1;
      padding: 12px;
      border: 2px solid #333;
      border-radius: 10px;
      background: #2a2a2a;
      color: #aaa;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .rt-btn.active {
      border-color: #4a9eff;
      background: #1a3a5c;
      color: #fff;
    }

    .set-btn {
      width: 100%;
      padding: 14px;
      background: #4a9eff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .set-btn:hover { background: #3a8eef; }
    .set-btn:active { background: #2a7edf; }

    .status {
      margin-top: 14px;
      text-align: center;
      font-size: 0.9rem;
      min-height: 1.2em;
      color: #888;
    }

    .status.ok  { color: #4caf50; }
    .status.err { color: #f44336; }
  </style>
</head>
<body>
<div class="card">
  <h1>Smart Clock</h1>

  <div class="field">
    <label>ESP32 IP Address</label>
    <input type="text" id="ip" placeholder="192.168.1.x" autocomplete="off" autocorrect="off">
  </div>

  <div class="row">
    <div class="field">
      <label>Hour (0–23)</label>
      <input type="number" id="hour" min="0" max="23" placeholder="7">
    </div>
    <div class="field">
      <label>Minute (0–59)</label>
      <input type="number" id="minute" min="0" max="59" placeholder="30">
    </div>
  </div>

  <label style="margin-bottom:10px;">Ringtone</label>
  <div class="ringtone-group">
    <button class="rt-btn active" data-rt="0" onclick="selectRingtone(0)">Nokia</button>
    <button class="rt-btn"       data-rt="1" onclick="selectRingtone(1)">Beeps</button>
  </div>

  <button class="set-btn" onclick="setAlarm()">Set Alarm</button>
  <div class="status" id="status"></div>
</div>

<script>
  let selectedRingtone = 0;

  function getIP() {
    return document.getElementById('ip').value.trim();
  }

  function selectRingtone(rt) {
    selectedRingtone = rt;
    document.querySelectorAll('.rt-btn').forEach(btn => {
      btn.classList.toggle('active', parseInt(btn.dataset.rt) === rt);
    });
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + (type || '');
  }

  async function setAlarm() {
    const ip  = getIP();
    const h   = parseInt(document.getElementById('hour').value);
    const m   = parseInt(document.getElementById('minute').value);

    if (!ip) { setStatus('Enter an IP address.', 'err'); return; }
    if (isNaN(h) || h < 0 || h > 23) { setStatus('Hour must be 0–23.', 'err'); return; }
    if (isNaN(m) || m < 0 || m > 59) { setStatus('Minute must be 0–59.', 'err'); return; }

    const url = `http://${ip}/set?hour=${h}&minute=${m}&ringtone=${selectedRingtone}`;
    try {
      const res = await fetch(url);
      if (res.ok) {
        setStatus('Alarm set!', 'ok');
        localStorage.setItem('esp32ip', ip);
      } else {
        setStatus(`Error ${res.status}`, 'err');
      }
    } catch (e) {
      setStatus('Could not reach ESP32.', 'err');
    }
  }

  async function fetchStatus() {
    const ip = getIP();
    if (!ip) return;
    try {
      const res  = await fetch(`http://${ip}/status`);
      const data = await res.json();
      document.getElementById('hour').value   = data.hour;
      document.getElementById('minute').value = data.minute;
      selectRingtone(data.ringtone);
      setStatus('');
    } catch (_) {
      // silently ignore — ESP32 might not be online yet
    }
  }

  // Restore saved IP and load current alarm on page load
  window.addEventListener('load', () => {
    const saved = localStorage.getItem('esp32ip');
    if (saved) {
      document.getElementById('ip').value = saved;
      fetchStatus();
    }
  });

  // Re-fetch status whenever IP changes
  document.getElementById('ip').addEventListener('change', fetchStatus);
</script>
</body>
</html>
