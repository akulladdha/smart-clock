<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brightrise</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Unbounded:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #080810;
      --surface:   #0e0e1a;
      --border:    #1a1a2e;
      --muted:     #2a2a45;
      --text:      #f0f0ff;
      --sub:       #5a5a80;
      --dim:       #30304a;
      --accent:    #c8ff00;
      --warn:      #ff6b35;
      --danger:    #ff2d6b;
      --mono:      'DM Mono', monospace;
      --display:   'Unbounded', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    /* ---- LEFT PANEL ---- */
    .left {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 48px 40px;
      position: relative;
      overflow: hidden;
    }

    .left::after {
      content: '';
      position: absolute;
      bottom: -120px;
      left: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(200,255,0,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 64px;
    }

    .brand-name {
      font-family: var(--display);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--accent);
    }

    .brand-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: breathe 2s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.7); }
    }

    .clock-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .clock-label {
      font-size: 0.65rem;
      color: var(--sub);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .clock-time {
      font-family: var(--display);
      font-size: clamp(4rem, 8vw, 6.5rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
      transition: color 0.3s;
    }

    .clock-time.ringing {
      color: var(--danger);
      animation: flicker 0.5s ease-in-out infinite alternate;
    }

    @keyframes flicker {
      from { opacity: 1; }
      to   { opacity: 0.7; }
    }

    .clock-date {
      font-size: 0.75rem;
      color: var(--sub);
      margin-top: 16px;
      letter-spacing: 0.08em;
    }

    .alarm-readout {
      margin-top: 48px;
      padding: 20px 0;
      border-top: 1px solid var(--border);
    }

    .alarm-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .alarm-label {
      font-size: 0.65rem;
      color: var(--sub);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .alarm-time-display {
      font-family: var(--display);
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--accent);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
      margin-top: 12px;
      border: 1px solid var(--border);
      color: var(--sub);
      transition: all 0.3s;
    }

    .status-pill.armed {
      border-color: rgba(200,255,0,0.3);
      color: var(--accent);
      background: rgba(200,255,0,0.05);
    }

    .status-pill.ringing {
      border-color: rgba(255,45,107,0.4);
      color: var(--danger);
      background: rgba(255,45,107,0.08);
      animation: pulse-border 1s ease-in-out infinite;
    }

    @keyframes pulse-border {
      0%, 100% { border-color: rgba(255,45,107,0.4); }
      50%       { border-color: rgba(255,45,107,0.9); }
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    /* ---- RIGHT PANEL ---- */
    .right {
      display: flex;
      flex-direction: column;
      padding: 48px 40px;
      gap: 2px;
    }

    .right-header {
      font-size: 0.65rem;
      color: var(--sub);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* ---- Sections ---- */
    .section {
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 24px;
      margin-bottom: 12px;
      position: relative;
      transition: border-color 0.2s;
    }

    .section:hover { border-color: var(--muted); }

    .section-tag {
      position: absolute;
      top: -9px;
      left: 16px;
      background: var(--bg);
      padding: 0 8px;
      font-size: 0.6rem;
      color: var(--sub);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ---- Alarm time inputs ---- */
    .time-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      font-size: 0.6rem;
      color: var(--sub);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-family: var(--display);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    .input-group input::-webkit-outer-spin-button,
    .input-group input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .input-group input:focus {
      border-color: var(--accent);
      background: rgba(200,255,0,0.03);
    }

    /* ---- Escalation display ---- */
    .esc-track {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .esc-step {
      flex: 1;
      padding: 10px 8px;
      border: 1px solid var(--border);
      border-radius: 2px;
      text-align: center;
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
      transition: all 0.3s;
    }

    .esc-step .esc-icon { font-size: 1rem; display: block; margin-bottom: 4px; }
    .esc-step .esc-name { color: var(--sub); }

    .esc-step.active-1 { border-color: var(--accent); color: var(--accent); background: rgba(200,255,0,0.05); }
    .esc-step.active-2 { border-color: var(--warn);   color: var(--warn);   background: rgba(255,107,53,0.05); }
    .esc-step.active-3 { border-color: var(--danger); color: var(--danger); background: rgba(255,45,107,0.05); }

    /* ---- Buttons ---- */
    .btn {
      width: 100%;
      padding: 14px 20px;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      color: var(--text);
    }

    .btn:hover { background: var(--surface); border-color: var(--muted); }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-accent {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
      font-weight: 700;
    }
    .btn-accent:hover { background: #d8ff20; border-color: #d8ff20; }

    .btn-danger {
      border-color: rgba(255,45,107,0.4);
      color: var(--danger);
    }
    .btn-danger:hover { background: rgba(255,45,107,0.08); border-color: var(--danger); }

    .btn-warn {
      border-color: rgba(255,107,53,0.4);
      color: var(--warn);
    }
    .btn-warn:hover { background: rgba(255,107,53,0.08); border-color: var(--warn); }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    /* ---- Toast ---- */
    .toast {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-align: center;
      min-height: 20px;
      padding: 6px 0;
      color: var(--sub);
      transition: color 0.2s;
    }
    .toast.ok  { color: var(--accent); }
    .toast.err { color: var(--danger); }

    /* ---- Alarm active panel ---- */
    .alarm-panel {
      display: none;
      border: 1px solid rgba(255,45,107,0.3);
      border-radius: 2px;
      padding: 24px;
      margin-bottom: 12px;
      background: rgba(255,45,107,0.04);
      position: relative;
      overflow: hidden;
    }

    .alarm-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--danger);
      animation: scan 2s linear infinite;
    }

    @keyframes scan {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }

    .alarm-panel.visible { display: block; }

    .alarm-panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .alarm-panel-title {
      font-family: var(--display);
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--danger);
      letter-spacing: 0.05em;
    }

    /* ---- Snooze counter ---- */
    .snooze-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid var(--border);
      margin-top: 12px;
    }

    .snooze-label { font-size: 0.65rem; color: var(--sub); letter-spacing: 0.1em; text-transform: uppercase; }
    .snooze-val   { font-family: var(--display); font-size: 1rem; font-weight: 700; color: var(--warn); }

    /* ---- Connection indicator ---- */
    .conn-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .conn-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--sub);
      transition: background 0.3s;
    }
    .conn-dot.connected { background: var(--accent); }

    .conn-text {
      font-size: 0.6rem;
      color: var(--sub);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      flex: 1;
    }

    .conn-ip {
      font-size: 0.6rem;
      color: var(--dim);
      letter-spacing: 0.05em;
    }

    /* ---- Responsive ---- */
    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
      .left { border-right: none; border-bottom: 1px solid var(--border); padding: 32px 24px; }
      .right { padding: 32px 24px; }
      .clock-time { font-size: 4.5rem; }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- ======== LEFT — CLOCK ======== -->
  <div class="left">
    <div class="brand">
      <div class="brand-dot"></div>
      <span class="brand-name">Brightrise</span>
    </div>

    <div class="clock-block">
      <div class="clock-label">Current Time</div>
      <div class="clock-time" id="live-clock">--:--</div>
      <div class="clock-date" id="live-date">---</div>

      <div class="alarm-readout">
        <div class="alarm-row">
          <span class="alarm-label">Alarm</span>
          <span class="alarm-time-display" id="alarm-display">--:--</span>
        </div>
        <div class="status-pill" id="status-pill">
          <span class="status-dot"></span>
          <span id="status-text">Idle</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ======== RIGHT — CONTROLS ======== -->
  <div class="right">
    <div class="right-header">Controls</div>

    <!-- Connection bar -->
    <div class="conn-bar">
      <div class="conn-dot" id="conn-dot"></div>
      <span class="conn-text" id="conn-text">Not connected</span>
      <span class="conn-ip" id="conn-ip"></span>
    </div>

    <!-- Active alarm panel -->
    <div class="alarm-panel" id="alarm-panel">
      <div class="alarm-panel-header">
        <div class="pulse-dot" style="width:8px;height:8px;border-radius:50%;background:var(--danger);animation:breathe 0.6s ease-in-out infinite;"></div>
        <span class="alarm-panel-title">Alarm Ringing</span>
      </div>

      <!-- Escalation tracker -->
      <div class="esc-track">
        <div class="esc-step" id="esc-1">
          <span class="esc-icon">🔔</span>
          <span class="esc-name">Ringtone</span>
        </div>
        <div class="esc-step" id="esc-2">
          <span class="esc-icon">📢</span>
          <span class="esc-name">Buzzer</span>
        </div>
        <div class="esc-step" id="esc-3">
          <span class="esc-icon">📞</span>
          <span class="esc-name">Calling</span>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-warn" onclick="doSnooze()">Snooze +5m</button>
        <button class="btn btn-danger" onclick="dismissAlarm()">Dismiss</button>
      </div>

      <div class="snooze-info">
        <span class="snooze-label">Snooze Count</span>
        <span class="snooze-val" id="snooze-count">0</span>
      </div>
    </div>

    <!-- Set alarm -->
    <div class="section">
      <span class="section-tag">Set Alarm</span>
      <div class="time-inputs">
        <div class="input-group">
          <label>Hour (0–23)</label>
          <input type="number" id="hour" min="0" max="23" placeholder="07">
        </div>
        <div class="input-group">
          <label>Minute (0–59)</label>
          <input type="number" id="minute" min="0" max="59" placeholder="30">
        </div>
      </div>
      <button class="btn btn-accent" onclick="setAlarm()">Confirm Alarm</button>
      <div class="toast" id="toast"></div>
    </div>

    <!-- Demo / trigger -->
    <div class="section">
      <span class="section-tag">Demo</span>
      <button class="btn btn-danger" onclick="triggerAlarm()">▶ Fire Alarm Now</button>
    </div>

    <!-- IP config -->
    <div class="section">
      <span class="section-tag">ESP32 Address</span>
      <div class="input-group" style="margin-bottom:12px;">
        <label>IP Address</label>
        <input type="text" id="esp-ip" placeholder="e.g. 192.168.1.42"
          style="font-family:var(--mono);font-size:0.9rem;font-weight:400;letter-spacing:0.05em;"
          oninput="updateESP(this.value)">
      </div>
      <button class="btn" onclick="pollStatus()">Test Connection</button>
    </div>

  </div>
</div>

<script>
  // ---- Config ----
  let ESP_IP = localStorage.getItem('esp_ip') || '';
  let ESP    = ESP_IP ? `http://${ESP_IP}` : '';

  // Pre-fill IP input
  if (ESP_IP) document.getElementById('esp-ip').value = ESP_IP;

  function updateESP(val) {
    ESP_IP = val.trim();
    ESP    = ESP_IP ? `http://${ESP_IP}` : '';
    localStorage.setItem('esp_ip', ESP_IP);
    document.getElementById('conn-ip').textContent = ESP_IP;
  }

  // ---- Clock ----
  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function tickClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('live-clock').textContent = `${h}:${m}`;
    document.getElementById('live-date').textContent  =
      `${DAYS[now.getDay()]}  ${MONTHS[now.getMonth()]} ${now.getDate()}`;
  }
  setInterval(tickClock, 1000);
  tickClock();

  // ---- Toast ----
  let toastTimer = null;
  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className   = 'toast ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.textContent = ''; el.className = 'toast'; }, 3000);
  }

  // ---- Status pill ----
  function setStatus(ringing) {
    const pill = document.getElementById('status-pill');
    const txt  = document.getElementById('status-text');
    const clk  = document.getElementById('live-clock');
    if (ringing) {
      pill.className = 'status-pill ringing';
      txt.textContent = 'Ringing';
      clk.classList.add('ringing');
    } else {
      pill.className = 'status-pill armed';
      txt.textContent = 'Armed';
      clk.classList.remove('ringing');
    }
  }

  // ---- Escalation highlight ----
  function setEscMode(mode) {
    [1,2,3].forEach(i => {
      const el = document.getElementById(`esc-${i}`);
      el.className = 'esc-step' + (i === mode ? ` active-${mode}` : '');
    });
  }

  // ---- Poll status ----
  async function pollStatus() {
    if (!ESP) { toast('Enter ESP32 IP first', 'err'); return; }
    try {
      const r = await fetch(`${ESP}/status`, { signal: AbortSignal.timeout(3000) });
      const d = await r.json();

      // Connection indicator
      document.getElementById('conn-dot').classList.add('connected');
      document.getElementById('conn-text').textContent = 'Connected';

      // Alarm time
      const h = String(d.hour).padStart(2,'0');
      const m = String(d.minute).padStart(2,'0');
      document.getElementById('alarm-display').textContent = `${h}:${m}`;

      // Pre-fill inputs if empty
      if (!document.getElementById('hour').value)   document.getElementById('hour').value   = d.hour;
      if (!document.getElementById('minute').value) document.getElementById('minute').value = d.minute;

      // Alarm active
      const panel = document.getElementById('alarm-panel');
      if (d.alarm_active) {
        panel.classList.add('visible');
        setStatus(true);
        setEscMode(d.esc_mode || 1);
        document.getElementById('snooze-count').textContent = d.snooze_count || 0;
      } else {
        panel.classList.remove('visible');
        setStatus(false);
      }

    } catch (_) {
      document.getElementById('conn-dot').classList.remove('connected');
      document.getElementById('conn-text').textContent = 'Unreachable';
    }
  }

  // ---- Set alarm ----
  async function setAlarm() {
    if (!ESP) { toast('Enter ESP32 IP first', 'err'); return; }
    const h = parseInt(document.getElementById('hour').value);
    const m = parseInt(document.getElementById('minute').value);
    if (isNaN(h) || h < 0 || h > 23) { toast('Hour must be 0–23', 'err'); return; }
    if (isNaN(m) || m < 0 || m > 59) { toast('Minute must be 0–59', 'err'); return; }
    try {
      const r = await fetch(`${ESP}/set?hour=${h}&minute=${m}&ringtone=1`);
      if (r.ok) {
        const ph = String(h).padStart(2,'0');
        const pm = String(m).padStart(2,'0');
        document.getElementById('alarm-display').textContent = `${ph}:${pm}`;
        document.getElementById('status-pill').className = 'status-pill armed';
        document.getElementById('status-text').textContent = 'Armed';
        toast(`Alarm set for ${ph}:${pm}`, 'ok');
      } else {
        toast(`Error ${r.status}`, 'err');
      }
    } catch (_) { toast('Cannot reach ESP32', 'err'); }
  }

  // ---- Trigger ----
  async function triggerAlarm() {
    if (!ESP) { toast('Enter ESP32 IP first', 'err'); return; }
    try {
      await fetch(`${ESP}/trigger`);
      toast('Alarm fired!', 'ok');
      setTimeout(pollStatus, 600);
    } catch (_) { toast('Cannot reach ESP32', 'err'); }
  }

  // ---- Dismiss ----
  async function dismissAlarm() {
    if (!ESP) return;
    try {
      const r = await fetch(`${ESP}/dismiss`);
      if (r.ok) {
        document.getElementById('alarm-panel').classList.remove('visible');
        setStatus(false);
        toast('Alarm dismissed', 'ok');
      }
    } catch (_) { toast('Cannot reach ESP32', 'err'); }
  }

  // ---- Snooze ----
  async function doSnooze() {
    if (!ESP) return;
    try {
      await fetch(`${ESP}/snooze`);
      toast('Snoozed +5 min', 'ok');
      setTimeout(pollStatus, 600);
    } catch (_) { toast('Cannot reach ESP32', 'err'); }
  }

  // ---- Init ----
  if (ESP) pollStatus();
  setInterval(pollStatus, 4000);
</script>
</body>
</html>
