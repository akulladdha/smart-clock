<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Alarm</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0a0a0f;
      --surface:  #12121a;
      --border:   #1e1e2e;
      --muted:    #3a3a52;
      --text:     #e8e8f0;
      --sub:      #6b6b88;
      --gentle:   #4fc3f7;
      --normal:   #ffb74d;
      --nuclear:  #f06292;
      --green:    #69f0ae;
      --mono:     'Space Mono', monospace;
      --sans:     'Syne', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px 60px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ---- Header ---- */
    .header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 4px;
    }
    .header h1 {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .header .tag {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--sub);
      border: 1px solid var(--muted);
      padding: 2px 7px;
      border-radius: 100px;
      letter-spacing: 0.05em;
    }

    /* ---- Live clock ---- */
    .clock-display {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .clock-time {
      font-family: var(--mono);
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--text);
    }
    .clock-meta {
      text-align: right;
    }
    .clock-label {
      font-size: 0.7rem;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }
    .alarm-set-time {
      font-family: var(--mono);
      font-size: 1.1rem;
      color: var(--gentle);
    }
    .strategy-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 100px;
      margin-top: 6px;
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .badge-gentle  { background: rgba(79,195,247,0.15); color: var(--gentle); }
    .badge-normal  { background: rgba(255,183,77,0.15);  color: var(--normal); }
    .badge-nuclear { background: rgba(240,98,146,0.15);  color: var(--nuclear); }

    /* ---- Cards ---- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
    }
    .card-label {
      font-size: 0.7rem;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 16px;
    }

    /* ---- Time inputs ---- */
    .time-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .time-row .field { flex: 1; }
    label {
      display: block;
      font-size: 0.72rem;
      color: var(--sub);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    input[type="number"] {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 1.05rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="number"]:focus { border-color: var(--muted); }

    /* ---- Strategy selector ---- */
    .strategy-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    .strat-btn {
      padding: 14px 8px 12px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .strat-icon { font-size: 1.4rem; }
    .strat-name {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--sub);
      transition: color 0.15s;
    }
    .strat-desc {
      font-size: 0.6rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.3;
    }
    .strat-btn[data-s="0"].active { border-color: var(--gentle); background: rgba(79,195,247,0.06); }
    .strat-btn[data-s="0"].active .strat-name { color: var(--gentle); }
    .strat-btn[data-s="1"].active { border-color: var(--normal); background: rgba(255,183,77,0.06); }
    .strat-btn[data-s="1"].active .strat-name { color: var(--normal); }
    .strat-btn[data-s="2"].active { border-color: var(--nuclear); background: rgba(240,98,146,0.06); }
    .strat-btn[data-s="2"].active .strat-name { color: var(--nuclear); }

    /* ---- Buttons ---- */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--text); color: var(--bg); }
    .btn-demo    { background: rgba(240,98,146,0.15); color: var(--nuclear); border: 1px solid rgba(240,98,146,0.3); }
    .btn-dismiss { background: rgba(105,240,174,0.12); color: var(--green);  border: 1px solid rgba(105,240,174,0.25); margin-top: 10px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ---- Status toast ---- */
    .toast {
      font-family: var(--mono);
      font-size: 0.78rem;
      text-align: center;
      color: var(--sub);
      min-height: 18px;
      transition: color 0.2s;
    }
    .toast.ok  { color: var(--green); }
    .toast.err { color: var(--nuclear); }

    /* ---- Active alarm panel ---- */
    .alarm-active-panel {
      background: rgba(240,98,146,0.06);
      border: 1px solid rgba(240,98,146,0.25);
      border-radius: 14px;
      padding: 20px 24px;
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    .alarm-active-panel.visible { display: flex; }
    .alarm-ring {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .pulse-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--nuclear);
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.4); opacity: 0.5; }
    }
    .alarm-ring-text {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--nuclear);
    }

    /* ---- Puzzle ---- */
    .puzzle-section {
      display: none;
      flex-direction: column;
      gap: 10px;
    }
    .puzzle-section.visible { display: flex; }
    .puzzle-q {
      font-family: var(--mono);
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      color: var(--text);
    }
    .puzzle-input-row { display: flex; gap: 8px; }
    .puzzle-input-row input {
      flex: 1;
      padding: 11px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 1.1rem;
      outline: none;
    }
    .btn-submit {
      padding: 11px 20px;
      background: var(--nuclear);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-family: var(--sans);
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .puzzle-feedback {
      font-family: var(--mono);
      font-size: 0.8rem;
      text-align: center;
      min-height: 16px;
    }
    .puzzle-feedback.ok  { color: var(--green); }
    .puzzle-feedback.err { color: var(--nuclear); }

    /* ---- Snooze count ---- */
    .snooze-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .snooze-label { font-size: 0.75rem; color: var(--sub); }
    .snooze-count {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--normal);
    }

    /* ---- Separator ---- */
    hr { border: none; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>Smart Alarm</h1>
    <span class="tag">ESP32</span>
  </div>

  <!-- Live clock + current alarm state -->
  <div class="clock-display">
    <div class="clock-time" id="live-clock">--:--</div>
    <div class="clock-meta">
      <div class="clock-label">Alarm set</div>
      <div class="alarm-set-time" id="alarm-set-display">--:--</div>
      <span class="strategy-badge badge-normal" id="strategy-badge">Normal</span>
    </div>
  </div>

  <!-- Active alarm panel (shown when alarm fires) -->
  <div class="alarm-active-panel" id="alarm-panel">
    <div class="alarm-ring">
      <div class="pulse-dot"></div>
      <span class="alarm-ring-text">Alarm Ringing</span>
    </div>

    <!-- Puzzle subsection (NUCLEAR only) -->
    <div class="puzzle-section" id="puzzle-section">
      <div style="font-size:0.7rem;color:var(--sub);text-transform:uppercase;letter-spacing:0.1em;">
        Solve to dismiss
      </div>
      <div class="puzzle-q" id="puzzle-q">-- + -- = ?</div>
      <div class="puzzle-input-row">
        <input type="number" id="puzzle-input" placeholder="Answer">
        <button class="btn-submit" onclick="submitPuzzle()">OK</button>
      </div>
      <div class="puzzle-feedback" id="puzzle-feedback"></div>
    </div>

    <button class="btn btn-dismiss" id="dismiss-btn" onclick="dismissAlarm()">
      Dismiss Alarm
    </button>

    <div class="snooze-row">
      <span class="snooze-label">Snooze count</span>
      <span class="snooze-count" id="snooze-count">0</span>
    </div>
  </div>

  <!-- Configure alarm -->
  <div class="card">
    <div class="card-label">Set Alarm</div>

    <div class="time-row">
      <div class="field">
        <label>Hour (0–23)</label>
        <input type="number" id="hour" min="0" max="23" placeholder="7">
      </div>
      <div class="field">
        <label>Minute (0–59)</label>
        <input type="number" id="minute" min="0" max="59" placeholder="30">
      </div>
    </div>

    <div class="card-label">Wake Strategy</div>
    <div class="strategy-grid">
      <button class="strat-btn" data-s="0" onclick="selectStrategy(0)">
        <span class="strat-icon">🌅</span>
        <span class="strat-name">Gentle</span>
        <span class="strat-desc">Nokia ringtone<br>warm LED</span>
      </button>
      <button class="strat-btn active" data-s="1" onclick="selectStrategy(1)">
        <span class="strat-icon">🔔</span>
        <span class="strat-name">Normal</span>
        <span class="strat-desc">Beep bursts<br>red LED pulse</span>
      </button>
      <button class="strat-btn" data-s="2" onclick="selectStrategy(2)">
        <span class="strat-icon">💀</span>
        <span class="strat-name">Nuclear</span>
        <span class="strat-desc">Active buzzer<br>+ math puzzle</span>
      </button>
    </div>

    <button class="btn btn-primary" onclick="setAlarm()">Set Alarm</button>
    <div class="toast" id="toast"></div>
  </div>

  <!-- Demo controls -->
  <div class="card">
    <div class="card-label">Demo Controls</div>
    <button class="btn btn-demo" onclick="triggerAlarm()">
      ▶ Fire Alarm Now
    </button>
  </div>

</div>

<script>
  // *** UPDATE THIS TO YOUR ESP32'S IP ***
  const ESP = "http://172.20.10.3";

  let selectedStrategy = 1;
  let pollInterval     = null;

  // ---- Helpers ----

  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent  = msg;
    el.className    = 'toast ' + type;
  }

  function selectStrategy(s) {
    selectedStrategy = s;
    document.querySelectorAll('.strat-btn').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.s) === s);
    });
  }

  // ---- Live browser clock (visual only — source of truth is NTP on ESP32) ----
  function tickClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('live-clock').textContent = `${h}:${m}`;
  }
  setInterval(tickClock, 1000);
  tickClock();

  // ---- Strategy badge ----
  const STRATEGY = ['Gentle', 'Normal', 'Nuclear'];
  const BADGE_CLASS = ['badge-gentle', 'badge-normal', 'badge-nuclear'];

  function updateBadge(s) {
    const el = document.getElementById('strategy-badge');
    el.textContent = STRATEGY[s];
    el.className   = 'strategy-badge ' + BADGE_CLASS[s];
  }

  // ---- Set alarm ----
  async function setAlarm() {
    const h = parseInt(document.getElementById('hour').value);
    const m = parseInt(document.getElementById('minute').value);
    if (isNaN(h) || h < 0 || h > 23) { toast('Hour must be 0–23', 'err'); return; }
    if (isNaN(m) || m < 0 || m > 59) { toast('Minute must be 0–59', 'err'); return; }
    try {
      const ringtone = selectedStrategy === 0 ? 0 : 1;
      const r = await fetch(`${ESP}/set?hour=${h}&minute=${m}&ringtone=${ringtone}`);
      if (r.ok) {
        toast('Alarm set', 'ok');
        document.getElementById('alarm-set-display').textContent =
          `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        updateBadge(selectedStrategy);
      } else {
        toast(`Error ${r.status}`, 'err');
      }
    } catch (_) { toast('Cannot reach ESP32 — check IP', 'err'); }
  }

  // ---- Trigger alarm now (demo) ----
  async function triggerAlarm() {
    try {
      await fetch(`${ESP}/trigger`);
      toast('Alarm fired!', 'ok');
      setTimeout(pollStatus, 500);
    } catch (_) { toast('Cannot reach ESP32', 'err'); }
  }

  // ---- Dismiss alarm ----
  async function dismissAlarm() {
    try {
      const r = await fetch(`${ESP}/dismiss`);
      if (r.ok) {
        toast('Dismissed', 'ok');
        setAlarmPanelVisible(false);
      } else if (r.status === 403) {
        toast('Solve the puzzle first', 'err');
      }
    } catch (_) { toast('Cannot reach ESP32', 'err'); }
  }

  // ---- Puzzle ----
  async function submitPuzzle() {
    const ans = document.getElementById('puzzle-input').value;
    const fb  = document.getElementById('puzzle-feedback');
    try {
      const r = await fetch(`${ESP}/puzzle/answer?answer=${ans}`);
      const d = await r.json();
      if (d.correct) {
        fb.textContent = 'Correct! Good morning.';
        fb.className   = 'puzzle-feedback ok';
        setTimeout(() => setAlarmPanelVisible(false), 800);
      } else {
        fb.textContent = `Wrong — attempt ${d.attempts}`;
        fb.className   = 'puzzle-feedback err';
        document.getElementById('puzzle-input').value = '';
        document.getElementById('puzzle-input').focus();
      }
    } catch (_) { fb.textContent = 'Error'; }
  }

  document.addEventListener('keydown', e => {
    const ps = document.getElementById('puzzle-section');
    if (e.key === 'Enter' && ps.classList.contains('visible')) submitPuzzle();
  });

  // ---- UI state ----
  function setAlarmPanelVisible(v) {
    const panel = document.getElementById('alarm-panel');
    panel.classList.toggle('visible', v);
    if (!v) {
      document.getElementById('puzzle-section').classList.remove('visible');
      document.getElementById('puzzle-feedback').textContent = '';
      document.getElementById('puzzle-input').value = '';
    }
  }

  // ---- Poll ESP32 status ----
  async function pollStatus() {
    try {
      const r = await fetch(`${ESP}/status`);
      const d = await r.json();

      document.getElementById('alarm-set-display').textContent =
        `${String(d.hour).padStart(2,'0')}:${String(d.minute).padStart(2,'0')}`;
      updateBadge(d.strategy);
      document.getElementById('snooze-count').textContent = d.snooze_count;

      if (d.alarm_active) {
        setAlarmPanelVisible(true);
        pollPuzzle(d.strategy);
      } else {
        setAlarmPanelVisible(false);
      }

      // Sync inputs only if empty (don't clobber user edits)
      const hEl = document.getElementById('hour');
      const mEl = document.getElementById('minute');
      if (!hEl.value) hEl.value = d.hour;
      if (!mEl.value) mEl.value = d.minute;
      if (selectedStrategy !== d.strategy) selectStrategy(d.strategy);
    } catch (_) {}
  }

  async function pollPuzzle(strategy) {
    if (strategy !== 2) {
      document.getElementById('puzzle-section').classList.remove('visible');
      return;
    }
    try {
      const r = await fetch(`${ESP}/puzzle`);
      const d = await r.json();
      const ps = document.getElementById('puzzle-section');
      if (d.active) {
        ps.classList.add('visible');
        document.getElementById('puzzle-q').textContent = d.question + ' = ?';
        // NUCLEAR: hide dismiss button — must solve puzzle
        document.getElementById('dismiss-btn').style.display = 'none';
      } else {
        ps.classList.remove('visible');
        document.getElementById('dismiss-btn').style.display = '';
      }
    } catch (_) {}
  }

  // Init
  pollStatus();
  setInterval(pollStatus, 3000);
</script>
</body>
</html>
